# Catppuccin Mocha Theme Profile
# Full theme: labwc + GTK3 + GTK4 + cursor + icons + fonts

[meta]
name=Catppuccin Mocha
description=Warm dark theme with pastel colors
author=Catppuccin
version=1.0

[colors]
base=#1e1e2e
mantle=#181825
crust=#11111b
surface0=#313244
surface1=#45475a
surface2=#585b70
overlay0=#6c7086
overlay1=#7f849c
overlay2=#9399b2
subtext0=#a6adc8
subtext1=#bac2de
text=#cdd6f4
lavender=#b4befe
blue=#89b4fa
sapphire=#74c7ec
sky=#89dceb
teal=#94e2d5
green=#a6e3a1
yellow=#f9e2af
peach=#fab387
maroon=#eba0ac
red=#f38ba8
mauve=#cba6f7
pink=#f5c2e7
flamingo=#f2cdcd
rosewater=#f5e0dc

[labwc]
themerc_bg=#1e1e2e
themerc_active_bg=#313244
themerc_inactive_bg=#181825
themerc_active_text=#cdd6f4
themerc_inactive_text=#6c7086
themerc_border=#45475a
themerc_font=sans 10
themerc_height=28

[gtk3]
gtk_theme=Catppuccin-Mocha-Standard-Dark
icon_theme=Papirus-Dark
cursor_theme=Catppuccin-Mocha-Dark
button_layout=close,minimize,maximize:menu
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true

[gtk4]
gtk_theme=Catppuccin-Mocha-Standard-Dark
icon_theme=Papirus-Dark
cursor_theme=Catppuccin-Mocha-Dark
color_scheme=prefer-dark

[fonts]
interface=Cantarell 11
document=Cantarell 11
monospace=JetBrains Mono 10

[panel]
bar_bg=rgba(30,30,46,0.92)
bar_text=#cdd6f4
bar_active=#89b4fa
bar_urgent=#f38ba8

[wallpaper]
style=dark
accent=#89b4fa
