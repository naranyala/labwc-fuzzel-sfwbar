# OCWS Variable Contract
# Single source of truth for IPC variable names.
# ocws-emit.sh and widgets MUST use these exact names.
#
# Validate with: scripts/validate-contract.sh

[system.volume]
emit_name = XVolLevel
type = int
range = 0-100
source = volume-text.widget scanner
consumers = volume-text.widget, ocws-control-center.widget

[system.volumemuted]
emit_name = XVolMuted
type = bool
source = volume-text.widget scanner
consumers = volume-text.widget, ocws-control-center.widget

[system.brightness]
emit_name = XBrightness
type = int
range = 0-100
source = brightness-text.widget scanner
consumers = brightness-text.widget, ocws-control-center.widget

[system.battery]
emit_name = XBatLvl
type = int
range = 0-100
source = ocws-sysmon.source
consumers = battery-text.widget, ocws-control-center.widget

[system.batterystate]
emit_name = XBatStat
type = string
values = Charging, Discharging, Full, Not charging
source = ocws-sysmon.source
consumers = battery-text.widget

[system.cpu]
emit_name = XCpuLoad
type = int
range = 0-100
source = ocws-sysmon.source (derived)
consumers = cpu-text.widget

[system.memory]
emit_name = XMemPct
type = float
range = 0-100
source = ocws-sysmon.source
consumers = memory-text.widget

[system.disk]
emit_name = XDiskPct
type = int
range = 0-100
source = disk.widget scanner
consumers = disk.widget

[system.dnd]
emit_name = XDndState
type = bool
source = (not yet implemented)
consumers = (none)

[network.wifi]
emit_name = XNetState
type = string
values = connected, disconnected
source = ocws-sysmon.source
consumers = ocws-control-center.widget, network-bandwidth.widget

[network.bluetooth]
emit_name = XBtState
type = string
values = On, Off
source = ocws-sysmon.source
consumers = bluetooth.widget, ocws-control-center.widget

[media.title]
emit_name = XMediaTitle
type = string
source = media-player.widget scanner
consumers = media-player.widget

[media.artist]
emit_name = XMediaArtist
type = string
source = media-player.widget scanner
consumers = media-player.widget

[media.status]
emit_name = XMediaStatus
type = string
values = Playing, Paused, Stopped, none
source = media-player.widget scanner
consumers = media-player.widget
