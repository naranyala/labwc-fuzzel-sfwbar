# OCWS Theme Schedule
# Map hour ranges to theme names
# Hours use 24h format. Ranges can wrap past midnight (e.g., 22-6).
# Theme names match files in themes/ directory (without .ini extension)
#
# Usage:
#   theme-scheduler.sh                    # Use this file
#   theme-scheduler.sh /path/to/custom.ini  # Use custom schedule
#
# To run automatically, add to crontab:
#   crontab -e
#   0 * * * * /path/to/theme-scheduler.sh
#
# Or systemd timer (see docs/theme-scheduling.md)

06-12 catppuccin-mocha
12-18 tokyo-night
18-22 dracula
22-06 nord
